rtmp:
  enabled: true          # Go RTMP ingest on :1935
  addr: ":1935"

http:
  addr: ":8080"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

node:
  id: "node-1"
  http_addr: "localhost:8080"
  role: "master"
  heartbeat_interval: 5s

topology:
  region: "demo-us"
  az: "demo-us-1a"

ha:
  dependency_timeout_ms: 1200
  lease_ttl_seconds: 90
  lease_clock_skew_seconds: 15
  lease_token_secret: "dev-only-change-me"
  idempotency_ttl_seconds: 180
  idempotency_max_keys: 20000

slo:
  api_availability_target: 99.95
  stream_start_success_target: 99.9
  first_frame_p95_ms_target: 2500
  reconnect_success_target: 99.9

hls:
  root_path: "./hls"
  segment_duration: 2
  max_segments: 10

storage:
  root_path: "./storage"

minio:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "recordings"
  use_ssl: false
  segment_duration: 10   # upload a new segment every 10s
  presign_expiry: 60     # presigned URL valid for 60 min
  enabled: true          # enable MinIO recording

media_mtx:
  enabled: false         # not used in standalone RTMP demo

pion_webrtc:
  enabled: false

logging:
  level: "info"
  dir: "./logs"
  info_file: "info.log"
  error_file: "error.log"
  stat_file: "stat.log"
  slow_file: "slow.log"
  slow_threshold_ms: 1000
  stat_interval_sec: 30
  telemetry:
    enabled: false
    endpoint: ""
    timeout_ms: 1500
    queue_size: 2048
