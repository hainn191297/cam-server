logLevel: info
logDestinations: [stdout]

# Live protocols
rtsp: yes
rtspAddress: :8554

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888

webrtc: yes
webrtcAddress: :8889

# Control/data APIs
api: yes
apiAddress: :9997

playback: yes
playbackAddress: :9996

# Explicitly allow no-auth for all IPs (bypasses default localhost restriction)
authInternalUsers:
- user: any
  pass:
  ips: [] # Allow any IP
  permissions:
  - action: api
  - action: read
  - action: publish
  - action: playback

pathDefaults:
  source: publisher
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 1m
  recordDeleteAfter: 72h
  # Notify Go server when a stream becomes ready / not ready.
  # The Go server pulls RTSP from MediaMTX and feeds its own subscriber pipeline.
  runOnReady: curl -sf -X POST "http://server:8080/internal/on-publish?path=$MTX_PATH&source_type=$MTX_SOURCE_TYPE&source_id=$MTX_SOURCE_ID&traceparent=$MTX_TRACEPARENT"
  runOnNotReady: curl -sf -X POST "http://server:8080/internal/on-unpublish?path=$MTX_PATH&source_type=$MTX_SOURCE_TYPE&source_id=$MTX_SOURCE_ID&traceparent=$MTX_TRACEPARENT"

paths:
  all:
