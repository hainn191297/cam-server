services:
  redis:
    image: redis:7.4-alpine
    container_name: go-cam-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cam-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: go-cam-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - cam-net
    restart: unless-stopped

  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: go-cam-mediamtx
    ports:
      - "1935:1935" # RTMP ingest
      - "8554:8554" # RTSP
      - "8888:8888" # HLS
      - "8889:8889" # WebRTC
      - "9996:9996" # Playback
      - "9997:9997" # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - recordings-data:/recordings
    networks:
      - cam-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9997/v3/config/global/get"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-cam-server
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      mediamtx:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - hls-data:/app/hls
      - storage-data:/app/storage
      - logs-data:/app/logs
    networks:
      - cam-net
    restart: unless-stopped

networks:
  cam-net:
    name: go-cam-network
    driver: bridge

volumes:
  redis-data:
  minio-data:
  recordings-data:
  hls-data:
  storage-data:
  logs-data:
